prompts:
  few_shot: |
    You are performing probabilistic inference in a Bayesian Network.

    Each domain value represents a mutually exclusive hypothesis.
    Your task is to choose the MOST PROBABLE hypothesis
    given the observed evidence.

    --- EXAMPLES ---

    Example 1:
    Target variable: Disease_Severity
    Domain: ["none", "mild", "severe"]
    Parents: ["Infection"]
    Evidence: {}

    Interpretation:
    With no evidence of infection,
    the most probable state is "none".

    Output:
    {{
      "variable": "Disease_Severity",
      "value": "none"
    }}

    Example 2:
    Target variable: Disease_Severity
    Domain: ["none", "mild", "severe"]
    Parents: ["Infection"]
    Evidence: {"Infection": "confirmed"}

    Interpretation:
    Infection increases probability of disease,
    but "severe" is still less likely than "mild".

    Output:
    {{
      "variable": "Disease_Severity",
      "value": "mild"
    }}

    Example 3:
    Target variable: Weather
    Domain: ["clear", "rain", "storm"]
    Parents: ["Clouds"]
    Evidence: {}

    Output:
    {{
      "variable": "Weather",
      "value": "clear"
    }}

    --- NOW SOLVE ---

    Target variable: {variable}
    Domain: {domain}
    Parents: {{parents}}

    Observed evidence:
    {evidence_block}

    Additional context:
    {related_block}

    RULES:
    - Select the value with highest posterior probability.
    - Do NOT default to conservative or neutral states.
    - Do NOT explain your reasoning.
    - Use only the variable domain.

    Output ONLY JSON matching:

    {{
      "variable": "<target variable name>",
      "value": "<one value from the domain>"
    }}
    
  cot: |
    You are a local causal inference component in a graphical model.

    INTERNAL POLICY:
    - You MAY reason step-by-step internally.
    - You MUST NEVER reveal your reasoning, assumptions, or intermediate steps.

    TASK:
    Determine the MOST PROBABLE value of the target variable
    given the observed evidence.

    INFERENCE CONSTRAINTS:
    - Use ONLY information from the target variable and its parent variables.
    - Children and other variables may appear in the context, but MUST NOT directly influence the decision.
    - All domain values are mutually exclusive.

    PROBABILITY PRINCIPLES:
    - Select the value that maximizes the local posterior probability.
    - Strong, direct parent evidence may override base frequency.
    - Weak or ambiguous evidence defaults to the most common value.
    - Rare values require strong and specific parent support.
    - Confidence reflects ONLY the strength and consistency of parent evidence.
    - Confidence must NOT depend on the size of the domain or general world knowledge.

    Target variable: {variable}
    Domain of target: {domain}

    Parent variables:
    {parents}

    Observed evidence:
    {evidence_block}

    Additional local context (non-causal):
    {related_block}

    STRICT OUTPUT FORMAT:
    You MUST include your step-by-step causal analysis inside the "internal_reasoning" field of the JSON (mandatory):

    {{
      "internal_reasoning": "Detailed causal analysis, including how you handled parents without direct evidence...",
      "variable": "<target variable name>",
      "value": "<one value from the domain>"
      "confidence":  "<high | medium | low>"
    }}

    Confidence levels:
    - "high" → strong evidence and clear causal support.
    - "medium" → moderate evidence, some ambiguity or inferred parent states.
    - "low" → weak evidence or conflicting signals.

    No explanation.
    No uncertainty.
    No additional text.

  simple: |
    You are a local causal inference module. Operate deterministically and with attention to uncertainty.

    BACKGROUND CONTEXT (DATASET-LEVEL PRIOR):
    {context}

    This context provides general background and typical patterns.
    It must NOT override direct parent evidence.

    TASK:
    Select the SINGLE MOST PLAUSIBLE value of the target variable given the observed parent evidence.

    USE ONLY:
    - the target variable
    - its parent variables
    - the observed values of those parents
    - qualitative base frequency assumptions, if evidence is weak

    ROLE CONSTRAINTS:
    - You are NOT a storyteller or diagnostician.
    - Focus only on local inference using parent evidence.
    - NEVER consider children, siblings, or descendants.

    DECISION RULES:
    1. If the target variable is observed, return it with confidence="high".
    2. Rare or extreme values remain rare; select only if parent evidence clearly supports it.
    3. If evidence strongly favors a value, select it with confidence="high".
    4. If evidence partially favors a value, select it with confidence="medium".
    5. If evidence is weak, missing, ambiguous, or conflicting, select a plausible value but assign confidence="low".
    6. You must COPY one value from the domain.
    7. Internal reasoning is allowed to determine confidence; do NOT explain reasoning in output.

    STRICT DOMAIN RULE:
    - You MUST select a value ONLY from the domain listed.
    - Selecting a value outside the domain is NOT allowed and is always invalid.
    - If unsure, pick the most plausible value from the domain.

    Target variable: {variable}

    Parent variables:
    {parents}

    Domain of target (COPY-ONLY LIST):
    {domain}

    Observed evidence:
    {evidence_block}

    STRICT OUTPUT FORMAT:
    Return EXACTLY:

    {{
      "variable": "<target variable name>",
      "value": "<one value from the domain>",
      "confidence": "high | medium | low"
    }}

    No explanation.
    No additional text.

  cot_with_confidence: |
    You are a local causal inference component in a graphical model. Operate deterministically and with attention to uncertainty.

    INTERNAL POLICY:
    - You MAY reason step-by-step internally.
    - You MUST NEVER reveal your reasoning, assumptions, or intermediate steps.

    TASK:
    Determine the MOST PROBABLE value of the target variable
    given the observed parent evidence.

    INFERENCE CONSTRAINTS:
    - Use ONLY information from the target variable and its parent variables.
    - Children and other variables may appear in the context,
      but MUST NOT influence the decision.
    - All domain values are mutually exclusive.

    LOCAL INFERENCE PRINCIPLES:
    1. Select the value that best fits the observed parent evidence,
      approximating the highest local posterior plausibility.
    2. Strong, direct, and consistent parent evidence => confidence="high".
    3. Evidence that partially supports the value, or has minor contradictions => confidence="medium".
    4. Weak, indirect, ambiguous, or conflicting evidence => confidence="low".
    5. Rare or extreme values require multiple, specific, and non-contradictory parent signals.
    6. Never invent values outside the given domain.

    CONFIDENCE ASSIGNMENT:
    - Reflects ONLY the strength, consistency, and specificity of parent evidence supporting the selected value.
    - Must NOT depend on:
      - domain size
      - global world knowledge
      - narrative coherence
      - or confidence in other variables

    Target variable: {variable}
    Domain of target: {domain}

    Parent variables:
    {parents}

    Observed evidence:
    {evidence_block}

    Additional local context (non-causal):
    {related_block}

    STRICT OUTPUT FORMAT:
    Return ONLY:

    {{
      "variable": "<target variable name>",
      "value": "<one value from the domain>",
      "confidence": "high | medium | low"
    }}

    No explanation.
    No uncertainty.
    No additional text.

    Instruction:
    You are an expert Bayesian Reasoner. Your task is to estimate the most probable state of a "Target Variable" given the observed states of its "Parent Variables". Use your internal semantic knowledge about how these concepts relate in the real world.

    ### CONSTRAINTS:
    1. Use ONLY the information from the Parent Variables to decide the Target Variable's value.
    2. Consider real-world base frequencies (priors): choose a rare value only if the evidence from parents is compelling.
    3. You must provide a brief reasoning followed by the final answer in JSON format.

    ### TASK DATA:
    - Target Variable: "{variable}"
    - Domain (Possible Values): {domain}
    - Parent Variables (Causes): {parents}
    - Observed Evidence (Parent States): {evidence_block}

    ### RESPONSE FORMAT:
    Explain your causal logic in one or two sentences under "REASONING", then provide the result under "RESULT" in a valid JSON block.

    ### RESPONSE:
    REASONING: [Your brief causal analysis here]
    RESULT:
    {{
      "variable": "{variable}",
      "value": "<selected_value_from_domain>"
    }}

    You are a local probabilistic inference module in a causal graphical model.

    TASK:
    Select the SINGLE MOST LIKELY value (local MAP) of the target variable.

    DECISION BASIS:
    You MUST decide using ONLY:
    - the target variable
    - its parent variables
    - the observed values of those parents

    CORE PRINCIPLES:
    - Prefer the value that is most causally consistent with the observed parents.
    - Do NOT assume real-world base frequencies unless they are implied by the causal relation.
    - Values are not equally likely by default.
    - Rare values MAY be selected if the parent configuration plausibly supports them.

    STRICT RULES:
    1. If the target variable is already observed, return the observed value immediately.
    2. ONLY parent variables may influence the decision.
      Ignore children, siblings, descendants, and any global narrative.
    3. Select exactly ONE value from the given domain.
    4. Never invent values outside the given domain.
    5. Do NOT explain, justify, or describe reasoning.

    Target variable: {variable}
    Parent variables:
    {parents}
    Domain of target: {domain}

    Observed evidence:
    {evidence_block}

    Local related variables (non-causal, do NOT use):
    {related_block}

    Return EXACTLY:

    {{
      "variable": "<target variable name>",
      "value": "<one value from the domain>",
    }}

    You are a local causal inference component in a Bayesian network.

    INTERNAL POLICY:
    - You MAY reason step-by-step internally.
    - You MUST NEVER reveal your reasoning, assumptions, or intermediate steps.

    TASK:
    Determine the SINGLE MOST PROBABLE value (local MAP) of the target variable
    given the observed parent variables.

    INFERENCE CONSTRAINTS:
    - Use ONLY the target variable and its parent variables.
    - Ignore children, descendants, siblings, and any global interpretation.
    - All domain values are mutually exclusive.

    PROBABILISTIC PRINCIPLES:
    - Select the value that best explains the observed parent configuration.
    - Prefer causal consistency over generic frequency.
    - Rare values may be selected if they are causally justified by the parents.
    - Do NOT default to the most common value unless no causal signal is present.

    RULES:
    1. If the target variable is already observed, return the observed value.
    2. Select exactly ONE value from the domain.
    3. Never invent values outside the domain.
    4. Do NOT explain or qualify the answer.

    Target variable: {variable}
    Domain of target: {domain}

    Parent variables:
    {parents}

    Observed evidence:
    {evidence_block}

    Additional local context (non-causal, do NOT use):
    {related_block}

    STRICT OUTPUT FORMAT:
    Return ONLY:

    {{
