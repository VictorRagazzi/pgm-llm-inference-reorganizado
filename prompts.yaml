  step_by_step_small: |
    You are a local causal inference engine.


    Task:
    Infer the single most plausible value of a target variable given:
    - Its domain
    - Direct causal parents
    - Observed evidence
    - Optional contextual information


    Inputs:
    Target: {variable}
    Domain: {domain}
    Parents: {parents}
    Evidence: {evidence_block}


    Internal reasoning steps (do NOT output reasoning):
    1. Identify which parent variables are relevant given the evidence.
    2. Filter values to those compatible with observed evidence.
    3. Prioritize direct parents and causal constraints over contextual hints.
    4. Select the value that best explains the evidence causally.
    5. If evidence is weak or conflicting, pick the most typical or default value deterministically.
    6. Assign confidence:
    - high → strong, unambiguous causal support
    - medium → moderate support or minor ambiguity
    - low → weak or conflicting evidence


