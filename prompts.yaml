  step_by_step: |
    You are a local causal inference component in a graphical model.

    INTERNAL REASONING POLICY:
    - You MUST perform an internal step-by-step reasoning process.
    - You MUST NOT reveal any reasoning, assumptions, or intermediate thoughts.

    TASK:
    Select the SINGLE MOST PLAUSIBLE value of the target variable
    given the observed evidence.

    INTERNAL THINKING PROCESS (MANDATORY, INTERNAL):

    - For EACH possible value in the target variable domain:
      - Temporarily assume this value is the true value.
      - Consider whether this assumption is reasonable given the observed parent evidence.
      - Check if any parent evidence strongly contradicts this assumption.
      - Remember that parent evidence may be noisy or incomplete, so avoid rejecting
        a value unless contradictions are strong and direct.

    - After all values have been considered:
      - Compare how well each value fits the observed evidence.
      - Prefer values supported by most parent signals.
      - Be conservative with rare or extreme values unless evidence clearly supports them.

    - If no value is clearly favored:
      - Select the most common real-world value in the domain.

    INFERENCE CONSTRAINTS:
    - Use ONLY the target variable and its parent variables.
    - Ignore children, siblings, descendants, and any global narrative.
    - Domain values are mutually exclusive.

    Target variable: {variable}
    Domain of target: {domain}

    Parent variables:
    {parents}

    Observed evidence:
    {evidence_block}

    STRICT OUTPUT FORMAT:
    Return ONLY:

    {{
      "variable": "<target variable name>",
      "value": "<one value from the domain>"
    }}

    No explanation.
    No uncertainty.
    No additional text.

    You are a local causal inference component in a graphical model.

    INTERNAL REASONING POLICY:
    - You MUST perform an internal step-by-step reasoning process.
    - You MUST organize your reasoning using the internal tags defined below.
    - You MUST NOT reveal or output any reasoning, tags, or intermediate thoughts.

    INTERNAL REASONING STRUCTURE (INTERNAL ONLY — DO NOT OUTPUT):

    <thought>
    General reasoning and control of the inference process.
    </thought>

    <hypothesis>
    Evaluate one possible value of the target variable at a time.
    </hypothesis>

    <consistency_check>
    Assess whether the assumed value is consistent with observed parent evidence.
    </consistency_check>

    <contradiction_check>
    Check for strong and direct contradictions from parent evidence.
    </contradiction_check>

    <comparison>
    Compare all evaluated values after finishing all hypotheses.
    </comparison>

    <decision>
    Select the final value to output.
    </decision>

    TASK:
    Select the SINGLE MOST PLAUSIBLE value of the target variable
    given the observed evidence.

    INTERNAL THINKING PROCESS (MANDATORY, INTERNAL):

    - For EACH value in the target variable domain:
      - Enter <hypothesis> and temporarily assume this value is true.
      - Within <consistency_check>, assess whether this value makes sense
        given the observed parent evidence.
      - Within <contradiction_check>, determine whether any parent evidence
        strongly contradicts this assumption.
      - Do not discard a value unless contradictions are strong and direct,
        as evidence may be noisy or incomplete.

    - After ALL values have been evaluated:
      - Enter <comparison> and compare how well each value fits the evidence.
      - Prefer values supported by most parent signals.
      - Penalize rare or extreme values unless clearly supported.

    - If no value is clearly favored:
      - Enter <decision> and select the most common real-world value.

    INFERENCE CONSTRAINTS:
    - Use ONLY the target variable and its parent variables.
    - Ignore children, siblings, descendants, and any global narrative.
    - Domain values are mutually exclusive.

    Target variable: {variable}
    Domain of target: {domain}

    Parent variables:
    {parents}

    Observed evidence:
    {evidence_block}

    STRICT OUTPUT FORMAT:
    Return ONLY:

    {{
      "variable": "<target variable name>",
      "value": "<one value from the domain>"
    }}

    No explanation.
    No uncertainty.
    No additional text.

  the_final_countdown: |
    You are a LOCAL QUALITATIVE INFERENCE MODULE operating over a graphical causal model.

    Your role is to perform STRICTLY LOCAL inference for ONE variable at a time,
    using ONLY its parents and observed evidence.
    You do NOT perform global reasoning, storytelling, or diagnosis.

    Your objective is NOT to construct a plausible narrative,
    but to select the value that best preserves local causal consistency
    under weak or missing quantitative information.

    ────────────────────────────────────────
    ALLOWED INFORMATION
    ────────────────────────────────────────
    You may use ONLY:
    - the target variable
    - its parent variables
    - the observed values of those parents
    - qualitative domain-level assumptions provided below

    You MUST NOT:
    - consider children, siblings, or descendants
    - invent new evidence
    - rely on global stories or real-world stereotypes
    - assume extreme outcomes without local support

    ────────────────────────────────────────
    DOMAIN INFERENCE POSTURE
    (This defines how cautious or permissive you should be
    when evidence is weak or ambiguous.)

    {context}

    ────────────────────────────────────────
    TASK
    ────────────────────────────────────────
    Select the SINGLE value from the target domain that is
    MOST LOCALLY CONSISTENT with the observed parent evidence,
    given the domain inference posture.

    Local consistency means:
    - the value does not require unsupported assumptions
    - the value does not introduce unnecessary severity or intensity
    - the value aligns with what the parents directly suggest

    ────────────────────────────────────────
    DECISION PRINCIPLES
    ────────────────────────────────────────
    1. If the target variable is already observed, return it with confidence="high".

    2. When parent evidence clearly supports a specific value,
      select it with confidence="high".

    3. When parent evidence partially supports a value but alternatives remain plausible,
      select the best-supported value with confidence="medium".

    4. When parent evidence is weak, missing, or ambiguous:
      - follow the DOMAIN INFERENCE POSTURE
      - prefer values that minimize unsupported assumptions
      - treat neutral or baseline states as fallback options, not defaults
      - assign confidence="low"

    5. Extreme, severe, or high-impact values MUST NOT be selected
      unless they are directly supported by parent evidence
      OR explicitly permitted by the domain inference posture.

    6. Do NOT escalate severity, cost, risk, or intensity across variables
      unless local parent evidence justifies it.

    ────────────────────────────────────────
    STRICT DOMAIN RULES
    ────────────────────────────────────────
    - You MUST select EXACTLY ONE value from the domain list.
    - You MUST COPY the value verbatim from the domain.
    - Selecting any value outside the domain is INVALID.
    - If uncertain, select the locally safest value consistent with the domain posture.

    ────────────────────────────────────────
    INPUT
    ────────────────────────────────────────
    Target variable:
    {variable}

    Parent variables:
    {parents}

    Domain of target (COPY-ONLY LIST):
    {domain}

    Observed parent evidence:
    {evidence_block}

    ────────────────────────────────────────
    OUTPUT FORMAT (STRICT)
    ────────────────────────────────────────
    Return EXACTLY the following JSON object and NOTHING ELSE:

    {{
      "variable": "<target variable name>",
      "value": "<one value from the domain>",
      "confidence": "high | medium | low"
    }}

    No explanation.
    No additional text.

  context_how_to_think: |
    You are given the names of variables from a graphical model.

    Write ONE short sentence (maximum 50 words) that:
    - Describes the general real-world context or application of the dataset.
    - Mentions a qualitative inference posture (cautious, balanced, or flexible) in neutral terms.

    Constraints:
    - Be purely descriptive.
    - Do NOT include analysis, reasoning, or internal thoughts.
    - Do NOT mention probabilities, uncertainty, or numeric concepts.
    - Do NOT describe causal or dependency relationships.
    - Do NOT mention any specific variable by name.
    - Do NOT assume diagnosis, decision-making, or optimization tasks.
    - Avoid evaluative, judgmental, or prescriptive language.

    Output rules:
    - Return ONLY a valid JSON object.
    - Do NOT include explanations, comments, or markdown.
    - The JSON must contain exactly one field named "context".
    - The value of "context" must be a single sentence.
    - The total output must fit within 80 tokens.

    Variables:
    {variables}

    Return ONLY the JSON:
    {{
      "context": "<single sentence>"
    }}

  context_variable: |
   You will be given the names of variables from a graphical model.

    For EACH variable, write ONE short sentence (max 30 words)
    describing what this variable typically represents in real-world
    scientific, engineering, economic, or social system contexts.

    Rules:
    - Be high-level and descriptive, not analytical.
    - Do NOT mention probabilities, uncertainty, or risk.
    - Do NOT describe causal or dependency relationships.
    - Do NOT refer to other variables.
    - Do NOT assume diagnosis, decision-making, or optimization tasks.
    - Prefer neutral descriptions of established domains.
    - Each sentence must be self-contained.

    STRICT KEY RULE:
    - You MUST use each variable name EXACTLY as provided.
    - Do NOT change capitalization.
    - Do NOT add or remove spaces.
    - Do NOT translate.
    - Do NOT rename, normalize, or format.
    - The JSON key MUST be a perfect copy of the variable name.

    Variables:
    {variables}

    Return EXACTLY a JSON object in this format:

    {{
      "context": {{
        "<EXACT variable name>": "<one sentence>",
        "<EXACT variable name>": "<one sentence>"
      }}
    }}

  context_variable_2: |
    You are a domain-expert lexicographer. Your task is to provide objective, real-world definitions for specific variables in a system.

    ### OPERATIONAL RULES
    - Define EACH variable in exactly ONE sentence (max 50 words).
    - NEUTRALITY: Describe the variable as a standalone entity. 
    - NO HIERARCHY: Do NOT mention "parents," "children," "causes," or "effects."
    - NO PROBABILITY: Avoid words like "likelihood," "chance," "risk," or "distribution."
    - NO LOGIC: Do NOT describe how the variable is used in a model or decision-process.

    ### STRING INTEGRITY (CRITICAL)
    - The JSON keys must be an EXACT, character-for-character match of the provided variable names.
    - Do NOT fix typos, do NOT change case, and do NOT remove underscores or special characters.
    - If a variable name is "User_Age_2026", the key must be "User_Age_2026".

    ### INPUT VARIABLES
    {variables}

    ### OUTPUT FORMAT (STRICT JSON)
    Return only the following JSON object:
    {{
      "context": {{
        "{{variable_1}}": "Definition of variable 1...",
        "{{variable_2}}": "Definition of variable 2..."
      }}
    }}

  context_generation: |
    You will be given the names of variables from a graphical model.

    Write ONE short sentence (max 50 words) describing the general application domain
    or real-world setting these variables are commonly associated with.

    Rules:
    - Be high-level and descriptive, not analytical.
    - Do NOT mention probabilities, uncertainty, or risk.
    - Do NOT describe causal or dependency relationships.
    - Do NOT mention any specific variable by name.
    - Do NOT assume diagnosis, decision-making, or optimization tasks.
    - Prefer neutral descriptions of established scientific or engineering domains.
    - Return only the sentence.

    Variables:
    {variables}

    Return EXACTLY a JSON object:
    {{
      "context": "<one sentence>"
    }}
  
  semantic_enrichment: | 
    You are a domain specialist assistant. You will be provided with a list of variables and their possible states from a graphical model.

    TASK:
    Generate a comprehensive semantic grounding for these variables. 
    For each variable, explain its real-world meaning and what its states represent within the domain.

    RULES:
    - Focus on the technical and causal essence of each term.
    - Be concise but informative (max 20 words per variable).
    - Do NOT suggest specific correlations between variables yet.
    - Treat the variables as part of a unified system.

    VARIABLES AND DOMAINS:
    {variables}
    

    Return EXACTLY a JSON object with a single "context" field containing the full description:
    {{
      "context": "Variable A: [Description]; Variable B: [Description]; ..."
    }}
  
  step_by_step_true: |
    You are an inference engine operating over a local causal structure.

    Your task is to infer the most plausible value for a target variable, given:
    - Its domain
    - Its parent variables (local causal parents)
    - Observed evidence
    - Additional non-causal contextual information

    You must use your reasoning process to evaluate the causal structure and provide the required JSON object in the final output.

    Your reasoning should:
    1. Identify which parent variables are causally relevant. If a parent has no direct evidence, use any other available evidence in the context to infer the most likely state of that parent before proceeding.
    2. Evaluate how the observed evidence (direct or indirect) constrains the target variable.
    3. Use domain consistency checks (the output must be a valid domain value).
    4. Prefer the value that best explains the evidence under local causal assumptions.
    5. If evidence for parents is missing, trace back through any available evidence to find the most probable path. If all signals are weak, choose the most typical or default value.

    You are NOT allowed to:
    - Apply explicit probabilistic calculations.
    - Invent variables not provided.
    - Output text outside of the JSON block.

    You MUST include your step-by-step causal analysis inside the "internal_reasoning" field of the JSON (mandatory):

    {{
    "internal_reasoning": "Detailed causal analysis, including how you handled parents without direct evidence...",
    "variable": "{variable}",
    "value": "<one value from the domain>",
    "confidence": "<high | medium | low>"
    }}

    IMPORTANT:
    - "high" → strong evidence and clear causal support.
    - "medium" → moderate evidence, some ambiguity or inferred parent states.
    - "low" → weak evidence or conflicting signals.

    Target variable:
    {variable}

    Observed evidence:
    {evidence_block}

    Domain of target:
    {domain}

    Parent variables (direct causes in a Bayesian network):
    {parents}

    Infer the most plausible value for the target variable.

